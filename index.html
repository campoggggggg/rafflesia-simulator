<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rafflesia</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/advancedsearch.css" />
</head>
<body>

  <canvas id="spore-canvas" style="
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  "></canvas>

  <div id="app-shell">
    <button id="sidebarExpandBtn" title="Mostra sidebar">&#9654;</button>

    <aside id="sidebar">
      <button id="sidebarCollapseBtn" title="Nascondi sidebar">&#9664;</button>
      <div class="logo">
        <img src="assets/rafflesia-logo.png" alt="Rafflesia Logo" class="logo-img">
        <p>Card Game Simulator</p>
      </div>

      <nav class="menu">
        <button class="nav-btn active" data-screen="home">Home</button>
        <button class="nav-btn" data-screen="play">Play</button>
        <button class="nav-btn" data-screen="deckbuilder">Deck builder</button>
        <button class="nav-btn" data-screen="settings">Settings</button>
        <button class="nav-btn" data-screen="advancedsearch">Advanced search</button>
      </nav>

      <div class="sidebar-footer">
        <p id="player-name-label">Player: asd</p>
        <button class="nav-btn" id="authSidebarBtn" style="margin-top: 12px; width: 100%; text-align: center;">
          Accedi
        </button>
      </div>
    </aside>

    <main id="main-content">
      <section id="screen-home"        class="screen active"></section>
      <section id="screen-play"        class="screen"></section>
      <section id="screen-deckbuilder" class="screen"></section>
      <section id="screen-settings"    class="screen"></section>
      <section id="screen-auth"        class="screen"></section>
      <section id="screen-advancedsearch" class="screen"></section>
    </main>
  </div>

  <!-- Supabase SDK — caricato come script globale prima del modulo -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Chart.js + plugin datalabels (label percentuale sulle barre) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

  <!-- Entry point: importa tutto il resto via ES modules -->
  <script type="module" src="js/core/app.js"></script>
</body>
</html>
