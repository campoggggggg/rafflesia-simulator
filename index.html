<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rafflesia</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div id="app-shell">
    <aside id="sidebar">
      <div class="logo">
  <img src="assets/rafflesia-logo.png" alt="Rafflesia Logo" class="logo-img">
  <p>Card Game Simulator</p>
</div>

      <nav class="menu">
        <button class="nav-btn active" data-screen="home">Home</button>
        <button class="nav-btn" data-screen="play">Play</button>
        <button class="nav-btn" data-screen="deckbuilder">Deck Builder</button>
        <button class="nav-btn" data-screen="settings">Settings</button>
      </nav>

      <div class="sidebar-footer">
        <p id="player-name-label">Player: Duelist</p>
      </div>
    </aside>

    <main id="main-content">
      <section id="screen-home" class="screen active"></section>
      <section id="screen-play" class="screen"></section>
      <section id="screen-deckbuilder" class="screen"></section>
      <section id="screen-settings" class="screen"></section>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/state.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/home.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/deckbuilder.js"></script>
  <script src="js/play.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
